name: Verify library & Generate documentation

on:
  push:
    branches:
    - main
    - metadata-localisation
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - run: git switch metadata-localisation

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 'latest'
        cache: 'npm'

    - name: Install Vivliostyle
      run: npm install -g @vivliostyle/cli clang-format

    - name: Install dependencies
      run: npm install

    - name: Build PDF
      run: make build
    
    - name: commit PDF
      run: git add . && git commit -m "[skip actions] build PDF" && git push

    - name: copy to gh-pages
      run: |
        DIR=$(mktemp -d)
        cp notebook.pdf $DIR
        cp build/*.css $DIR
        cp build/*.html $DIR
        git clean -dfx
        git switch gh-pages
        cp $DIR/* .
        git add . && git commit -m "build PDF" && git push
        git switch main
